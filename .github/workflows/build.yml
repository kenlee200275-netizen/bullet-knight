name: Build APK

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

steps:
- uses: actions/checkout@v3

- name: Install system deps
  run: |
    sudo apt update
    sudo apt install -y python3-pip python3-setuptools git zip unzip openjdk-17-jdk

- name: Install python deps
  run: |
    pip install --upgrade pip
    pip install buildozer cython kivy

- name: Create buildozer.spec if not exists
  run: |
    if [ ! -f buildozer.spec ]; then
      buildozer init
    fi

- name: Configure buildozer
  run: |
    sed -i 's/^title = .*/title = Bullet Knight/' buildozer.spec
    sed -i 's/^package.name = .*/package.name = bulletknight/' buildozer.spec
    sed -i 's/^package.domain = .*/package.domain = org.test/' buildozer.spec
    sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
    sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,wav,mp3,json/' buildozer.spec
    sed -i 's/^orientation = .*/orientation = landscape/' buildozer.spec
    echo "android.permissions = INTERNET" >> buildozer.spec

- name: Build APK
  run: buildozer -v android debug

- name: Upload APK
  uses: actions/upload-artifact@v3
  with:
    name: bullet-knight-apk
    path: bin/*.apk
