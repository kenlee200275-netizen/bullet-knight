name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y \
        python3-pip \
        git zip unzip \
        openjdk-17-jdk \
        autoconf libtool pkg-config \
        zlib1g-dev libncurses5-dev libncursesw5-dev \
        libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Python deps
      run: |
        python3 -m pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Accept licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK
      run: |
        rm -rf .buildozer

        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

        sed -i 's/title = .*/title = BulletKnight/' buildozer.spec
        sed -i 's/package.name = .*/package.name = bulletknight/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.test/' buildozer.spec

        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 23b/' buildozer.spec

        buildozer android clean
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: apk
        path: bin/*.apk
